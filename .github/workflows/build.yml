name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate
          sed -i '' 's/objectVersion = 77;/objectVersion = 56;/g' SimpleBrowser.xcodeproj/project.pbxproj

      - name: Build Application
        run: |
          set -o pipefail
          xcodebuild build \
            -project SimpleBrowser.xcodeproj \
            -scheme SimpleBrowser \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee xcodebuild.log

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SimpleBrowser-Build-Log
          path: xcodebuild.log

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/SimpleBrowser.app Payload/
          zip -r SimpleBrowser.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SimpleBrowser-IPA
          path: SimpleBrowser.ipa
