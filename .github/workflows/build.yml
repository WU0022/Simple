name: Build iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare app icon
        run: |
          rm -rf Assets.xcassets
          mkdir -p Assets.xcassets/AppIcon.appiconset

          cat << 'EOF' > create_icon.swift
          import AppKit

          let canvasSize = CGSize(width: 1024, height: 1024)
          let image = NSImage(size: canvasSize)

          image.lockFocus()

          let background = NSBezierPath(roundedRect: NSRect(x: 0, y: 0, width: 1024, height: 1024), xRadius: 224, yRadius: 224)
          NSColor(red: 0.05, green: 0.38, blue: 0.86, alpha: 1).setFill()
          background.fill()

          let outerCircle = NSBezierPath(ovalIn: NSRect(x: 202, y: 202, width: 620, height: 620))
          NSColor.white.setStroke()
          outerCircle.lineWidth = 44
          outerCircle.stroke()

          let innerCircle = NSBezierPath(ovalIn: NSRect(x: 470, y: 470, width: 84, height: 84))
          NSColor.white.setFill()
          innerCircle.fill()

          let needle = NSBezierPath()
          needle.move(to: NSPoint(x: 642, y: 702))
          needle.line(to: NSPoint(x: 418, y: 420))
          needle.line(to: NSPoint(x: 602, y: 510))
          needle.close()
          NSColor.white.setFill()
          needle.fill()

          image.unlockFocus()

          guard
              let tiffData = image.tiffRepresentation,
              let bitmap = NSBitmapImageRep(data: tiffData),
              let pngData = bitmap.representation(using: .png, properties: [:])
          else {
              exit(1)
          }

          try pngData.write(to: URL(fileURLWithPath: "Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png"))
          EOF

          swift create_icon.swift

          for size in 40 58 60 76 80 87 120 152 167 180; do
            sips -z "$size" "$size" Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png --out "Assets.xcassets/AppIcon.appiconset/Icon-$size.png" >/dev/null
          done

          cat << 'EOF' > Assets.xcassets/Contents.json
          {
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF

          cat << 'EOF' > Assets.xcassets/AppIcon.appiconset/Contents.json
          {
            "images" : [
              {
                "filename" : "Icon-40.png",
                "idiom" : "iphone",
                "scale" : "2x",
                "size" : "20x20"
              },
              {
                "filename" : "Icon-60.png",
                "idiom" : "iphone",
                "scale" : "3x",
                "size" : "20x20"
              },
              {
                "filename" : "Icon-58.png",
                "idiom" : "iphone",
                "scale" : "2x",
                "size" : "29x29"
              },
              {
                "filename" : "Icon-87.png",
                "idiom" : "iphone",
                "scale" : "3x",
                "size" : "29x29"
              },
              {
                "filename" : "Icon-80.png",
                "idiom" : "iphone",
                "scale" : "2x",
                "size" : "40x40"
              },
              {
                "filename" : "Icon-120.png",
                "idiom" : "iphone",
                "scale" : "3x",
                "size" : "40x40"
              },
              {
                "filename" : "Icon-120.png",
                "idiom" : "iphone",
                "scale" : "2x",
                "size" : "60x60"
              },
              {
                "filename" : "Icon-180.png",
                "idiom" : "iphone",
                "scale" : "3x",
                "size" : "60x60"
              },
              {
                "filename" : "AppIcon-1024.png",
                "idiom" : "ios-marketing",
                "scale" : "1x",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          EOF

      - name: Remove unused Homebrew tap
        run: brew untap aws/tap || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project SimpleBrowser.xcodeproj \
            -scheme SimpleBrowser \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          rm -rf Payload SimpleBrowser.ipa
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/SimpleBrowser.app Payload/
          zip -qry SimpleBrowser.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v6
        with:
          name: SimpleBrowser-IPA
          path: SimpleBrowser.ipa
          if-no-files-found: error
