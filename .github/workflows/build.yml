name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate App Icon
        run: |
          mkdir -p Assets.xcassets/AppIcon.appiconset
          swift - << 'EOF'
          import AppKit
          let size = CGSize(width: 1024, height: 1024)
          let image = NSImage(size: size)
          image.lockFocus()
          let ctx = NSGraphicsContext.current!.cgContext
          let colorSpace = CGColorSpaceCreateDeviceRGB()
          let colors = [NSColor(red: 0.12, green: 0.53, blue: 0.98, alpha: 1.0).cgColor,
                        NSColor(red: 0.05, green: 0.35, blue: 0.82, alpha: 1.0).cgColor] as CFArray
          let gradient = CGGradient(colorsSpace: colorSpace, colors: colors, locations: [0, 1])!
          ctx.drawLinearGradient(gradient, start: CGPoint(x: 0, y: 1024), end: CGPoint(x: 1024, y: 0), options: [])
          
          ctx.setFillColor(NSColor.white.cgColor)
          let circlePath = CGPath(ellipseIn: CGRect(x: 256, y: 256, width: 512, height: 512), transform: nil)
          ctx.addPath(circlePath)
          ctx.fillPath()
          
          ctx.setFillColor(NSColor(red: 0.12, green: 0.53, blue: 0.98, alpha: 1.0).cgColor)
          let innerPath = CGPath(ellipseIn: CGRect(x: 384, y: 384, width: 256, height: 256), transform: nil)
          ctx.addPath(innerPath)
          ctx.fillPath()
          
          image.unlockFocus()
          if let tiff = image.tiffRepresentation, let rep = NSBitmapImageRep(data: tiff), let png = rep.representation(using: .png, properties: [:]) {
              try? png.write(to: URL(fileURLWithPath: "Assets.xcassets/AppIcon.appiconset/icon.png"))
          }
          EOF

      - name: Generate Xcode Project
        run: |
          xcodegen generate
          sed -i '' 's/objectVersion = 77;/objectVersion = 56;/g' SimpleBrowser.xcodeproj/project.pbxproj

      - name: Build Application
        run: |
          xcodebuild build \
            -project SimpleBrowser.xcodeproj \
            -scheme SimpleBrowser \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/SimpleBrowser.app Payload/
          zip -r SimpleBrowser.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleBrowser-IPA
          path: SimpleBrowser.ipa
